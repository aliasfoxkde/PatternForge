name = "patternforge"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[vars]
APP_NAME = "PatternForge"
APP_URL = "https://patternforge.pages.dev"

# D1 database for shared patterns
[[d1_databases]]
binding = "DB"
database_name = "patternforge-db"
database_id = "cc830f16-f78f-4c71-94cc-359346f1fed1"

# R2 bucket for image uploads
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "patternforge-images"
